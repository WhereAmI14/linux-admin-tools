name: slow-mysqlqueries-sonar

on:
  push:
    branches:
      - dev
    paths:
      - "slow-mysqlqueries/**"
      - ".github/workflows/slow-mysqlqueries-*.yml"
  pull_request:
    branches:
      - dev
    paths:
      - "slow-mysqlqueries/**"
      - ".github/workflows/slow-mysqlqueries-*.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Detect Sonar token
        id: sonar-token
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN is not set. SonarQube Cloud scan will be skipped."
          fi

      - name: Check out repository
        if: steps.sonar-token.outputs.present == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.sonar-token.outputs.present == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests before analysis
        if: steps.sonar-token.outputs.present == 'true'
        run: python -m unittest discover -s slow-mysqlqueries/temp-files-and-tests/tests -v

      - name: SonarQube Cloud scan
        if: steps.sonar-token.outputs.present == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: slow-mysqlqueries/

      - name: Skip SonarQube Cloud scan
        if: steps.sonar-token.outputs.present != 'true'
        run: echo "Skipping SonarQube Cloud scan because SONAR_TOKEN is not configured."
