name: slow-mysqlqueries-sonar

on:
  push:
    branches:
      - dev
    paths:
      - "slow-mysqlqueries/**"
      - ".github/workflows/slow-mysqlqueries-*.yml"
  pull_request:
    branches:
      - dev
    paths:
      - "slow-mysqlqueries/**"
      - ".github/workflows/slow-mysqlqueries-*.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    if: ${{ secrets.SONAR_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests before analysis
        run: python -m unittest discover -s slow-mysqlqueries/new-version1/tests -v

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: slow-mysqlqueries/new-version1

