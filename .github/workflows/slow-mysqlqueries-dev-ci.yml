name: slow-mysqlqueries-dev-ci

on:
  push:
    branches:
      - dev
    paths:
      - "slow-mysqlqueries/**"
      - ".github/workflows/slow-mysqlqueries-*.yml"
  pull_request:
    branches:
      - dev
    paths:
      - "slow-mysqlqueries/**"
      - ".github/workflows/slow-mysqlqueries-*.yml"

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install ruff==0.15.1

      - name: Run Ruff
        run: python -m ruff check slow-mysqlqueries/slow_query_review.py slow-mysqlqueries/temp-files-and-tests/tests/

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: ruff
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Compile the tool
        run: python -m py_compile slow-mysqlqueries/slow_query_review.py

      - name: Run unit tests
        run: python -m unittest discover -s slow-mysqlqueries/temp-files-and-tests/tests -v

      - name: Run CLI smoke test
        run: >
          python slow-mysqlqueries/slow_query_review.py
          --all-users
          --log-file slow-mysqlqueries/temp-files-and-tests/tests/fixtures/sample_slow.log
          --top 3
          --no-color
